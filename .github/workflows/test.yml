name: UnionFS Overflow Test

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: System info
        run: |
          systeminfo | findstr /B /C:"OS Name" /C:"OS Version"
          whoami
          whoami /priv
        shell: cmd

      - name: Check filters
        run: fltmc
        shell: cmd
        continue-on-error: true

      - name: Start Docker and switch to Windows containers
        run: |
          # Switch to Windows containers
          & "C:\Program Files\Docker\Docker\DockerCli.exe" -SwitchWindowsEngine 2>&1
          Start-Sleep 10
          # Make sure dockerd is running
          Start-Service docker -ErrorAction SilentlyContinue
          Start-Sleep 5
          docker info
        shell: powershell

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile test
        run: |
          cl.exe /nologo /O2 test_overflow.c /Fe:test_overflow.exe /link fltlib.lib advapi32.lib kernel32.lib
          dir test_overflow.exe
        shell: cmd

      - name: Run on host first
        run: test_overflow.exe
        shell: cmd
        continue-on-error: true

      - name: Build Windows container
        run: docker build -t unionfs-test .
        continue-on-error: true

      - name: Run in container (process isolation)
        run: docker run --isolation=process unionfs-test
        continue-on-error: true

      - name: Run in container (default isolation)
        run: docker run unionfs-test
        continue-on-error: true

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: test_overflow
          path: test_overflow.exe
