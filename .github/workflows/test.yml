name: UnionFS Overflow Test

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: System info
        run: |
          systeminfo | findstr /B /C:"OS Name" /C:"OS Version"
          whoami
        shell: cmd

      - name: Check filters
        run: fltmc
        shell: cmd
        continue-on-error: true

      - name: Start Docker (Windows containers)
        run: |
          # The runner has dockerd but not Docker Desktop
          # Start the docker service directly
          Start-Service docker -ErrorAction SilentlyContinue
          Start-Sleep 3
          # Check if already running
          docker info 2>&1
          docker version 2>&1
        shell: powershell
        continue-on-error: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile test
        run: |
          cl.exe /nologo /O2 test_overflow.c /Fe:test_overflow.exe /link fltlib.lib advapi32.lib kernel32.lib
          dir test_overflow.exe
        shell: cmd

      - name: Run on host (as admin)
        run: |
          echo === Running directly on host ===
          test_overflow.exe
        shell: cmd
        continue-on-error: true

      - name: Build Windows container
        run: docker build -t unionfs-test .
        continue-on-error: true

      - name: Run in container (process isolation)
        run: docker run --isolation=process unionfs-test
        continue-on-error: true

      - name: Run in container (default)
        run: docker run unionfs-test
        continue-on-error: true

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: test_overflow
          path: test_overflow.exe
